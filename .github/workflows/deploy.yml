name: FTP Deploy

on:
  push:
    branches:
      - master
      - dev
      - stage
      - prod

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: npm run build

      - name: Deploy to Dev FTP
        if: github.ref == 'refs/heads/dev'
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          ftp-server: ${{ secrets.FTP_HOST_DEV }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build
          server-dir: /

      - name: Deploy to Stage FTP
        if: github.ref == 'refs/heads/stage'
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          ftp-server: ${{ secrets.FTP_HOST_STAGE }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build
          server-dir: /

      - name: Deploy to Prod FTP
        if: github.ref == 'refs/heads/prod'
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          ftp-server: ${{ secrets.FTP_HOST_PROD }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build
          server-dir: /
